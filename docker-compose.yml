services:
  db:
    image: postgres:16
    container_name: fx-quotes-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: fx-quotes-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FX_API_URL: ${FX_API_URL}
      FX_API_KEY: ${FX_API_KEY}
      HTTP_ADDR: ${HTTP_ADDR}
      WORKER_COUNT: ${WORKER_COUNT:-1}
      RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS:-3}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS:-500}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1000}
      BATCH_SIZE: ${BATCH_SIZE:-10}
      JOB_TIMEOUT_MS: ${JOB_TIMEOUT_MS:-30000}
      MAX_CLAIM_ATTEMPTS: ${MAX_CLAIM_ATTEMPTS:-5}
      STALE_AFTER_MS: ${STALE_AFTER_MS:-0}
    ports:
      - "8080:8080"

volumes:
  db_data:
